name: Bug report
description: Report something broken or confusing
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste terminal output or error messages
      render: shell
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 14.x, dotnet 10.x, VS Code ..."
    validations:
      required: false
