name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.fsproj
            **/*.props
            **/*.targets
            **/packages.lock.json
            global.json

      - name: Restore
        run: dotnet restore "src/CS1302.Labs.slnx"

      - name: Build
        run: dotnet build "src/CS1302.Labs.slnx" -c Release --no-restore --nologo

      - name: Test
        run: dotnet test "src/CS1302.Labs.slnx" -c Release --no-build --nologo
