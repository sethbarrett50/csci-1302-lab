name: lint-format

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.props
            **/*.targets
            global.json
            .config/dotnet-tools.json

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Check formatting (CSharpier)
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build "src/CS1302.Labs.slnx" -c Release --nologo

      - name: Test
        run: dotnet test "src/CS1302.Labs.slnx" -c Release --no-build --nologo
